<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Finder voor Logistiek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .fade { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 md:p-6">
<div id="app" class="max-w-3xl mx-auto"></div>

<script>
const questions = [
    { id: 'bedrijfsnaam', question: 'Wat is de naam van uw bedrijf?', type: 'text', placeholder: 'Bijv. Transport Solutions BV' },
    { id: 'proces', question: 'Welk proces wilt u verbeteren met AI-tools?', type: 'select', options: ['Forecasting','Order Entry','Transport selectie/modaliteitskeuze','Enkelvoudige transportplanning','Complexe transportplanning','Documentatie','Goederen voorbereiding','Transport uitvoering','Goederen afleveren','Facturatie en afwikkeling','Dashboarding','Samenwerking en communicatie','Anders'] },
    { id: 'procesAnders', question: 'Kunt u aangeven welk ander proces u wilt verbeteren?', type: 'textarea', placeholder: 'Beschrijf het proces', conditional: true, showWhen: { field: 'proces', value: 'Anders' } },
    { id: 'pijnpunt', question: 'Wat is uw grootste uitdaging? (meerdere antwoorden mogelijk)', type: 'multiselect', options: ['Te tijdrovend/handmatig werk','Te veel fouten','Geen real-time inzicht','Slechte communicatie met klanten/partners','Hoge operationele kosten','Anders'], optional: true },
    { id: 'specifiekeDoel', question: 'Kunt u het doel specifieker omschrijven?', type: 'textarea', placeholder: 'Bijv. We willen onze rijtijden met 15% verkorten en brandstofkosten verlagen' },
    { id: 'oplossingstype', question: 'Wat voor type oplossing zoekt u?', type: 'select', options: ['Zelfstandige AI-tool (specifiek voor één functie)','AI-functionaliteit binnen bestaand systeem (TMS/WMS/ERP met AI)','Complete softwaresystemen met AI-ondersteuning','Geen voorkeur - alle opties tonen','Anders'] },
    { id: 'digitalisatiegraad', question: 'Hoe digitaal werkt uw bedrijf momenteel?', type: 'select', options: ['Voornamelijk papier en Excel','Mix van papier en digitale systemen','Grotendeels gedigitaliseerd met losse systemen','Volledig geïntegreerd digitaal ecosysteem','Anders'] },
    { id: 'budget', question: 'Wat is uw eenmalige investeringsbudget?', type: 'select', options: ['Minder dan €2.500','€2.500 - €10.000','€10.000 - €25.000','€25.000 - €75.000','€75.000 - €150.000','Meer dan €150.000','Anders'] },
    { id: 'budgetJaarlijks', question: 'Wat is uw jaarlijks budget voor licenties en onderhoud?', type: 'select', options: ['Minder dan €1.000 per jaar','€1.000 - €5.000 per jaar','€5.000 - €15.000 per jaar','€15.000 - €30.000 per jaar','Meer dan €30.000 per jaar','Anders'] },
    { id: 'roiVerwachting', question: 'Binnen welke termijn verwacht u rendement te zien?', type: 'select', options: ['Direct (binnen 3 maanden)','Kort (3-6 maanden)','Middellang (6-12 maanden)','Lang (1-2 jaar)','Onbekend','Anders'] },
    { id: 'medewerkers', question: 'Hoeveel medewerkers zullen de tool gebruiken?', type: 'select', options: ['1-5 medewerkers','6-15 medewerkers','16-50 medewerkers','Meer dan 50 medewerkers','Anders'] },
    { id: 'groeiVerwachting', question: 'Verwacht u groei in de komende 2 jaar?', type: 'select', options: ['Nee, huidige schaal blijft gelijk','Ja, matige groei (0-5%)','Ja, sterke groei (6-15%)','Ja, zeer sterke groei (16-25%)','Ja, extreme groei (25%+)','Anders'] },
    { id: 'urgentie', question: 'Hoe urgent is de implementatie?', type: 'select', options: ['Direct nodig (binnen 1 maand)','Op korte termijn (1-3 maanden)','Middellange termijn (3-6 maanden)','Verkenningsfase (6+ maanden)','Anders'] },
    { id: 'technischeKennis', question: 'Hoe is de technische kennis binnen uw bedrijf?', type: 'select', options: ['Beperkt - we hebben externe ondersteuning nodig','Gemiddeld - basis IT-kennis aanwezig','Goed - ervaren met software implementaties','Uitstekend - eigen IT-afdeling','Anders'] },
    { id: 'trainingVoorkeur', question: 'Welke vorm van training en ondersteuning heeft u nodig?', type: 'textarea', placeholder: 'Bijv. online training sessies, on-site training, dedicated account manager, etc.' },
    { id: 'integratie', question: 'Moet de tool integreren met bestaande systemen?', type: 'select', options: ['Ja, met TMS (Transport Management Systeem)','Ja, met ERP-systeem','Ja, met WMS-systeem','Ja, met boekhoudsoftware','Ja, met meerdere systemen','Nee, standalone oplossing is voldoende','Weet ik niet zeker','Anders'] },
    { id: 'systeemNaam', question: 'Met welk systeem of systemen moet de tool integreren?', type: 'textarea', placeholder: 'Bijv. SAP ERP, Exact Online, TransFollow TMS, etc.', conditional: true, showWhen: { field: 'integratie', values: ['Ja, met TMS (Transport Management Systeem)','Ja, met ERP-systeem','Ja, met WMS-systeem','Ja, met boekhoudsoftware','Ja, met meerdere systemen'] } },
    { id: 'dataGevoeligheid', question: 'Verwerkt u gevoelige data? (meerdere antwoorden mogelijk)', type: 'multiselect', options: ['Nee, standaard bedrijfsdata','Ja, klantgegevens (AVG-gevoelig)','Ja, financiële data','Ja, contractuele/vertrouwelijke informatie','Weet ik niet zeker','Anders'], optional: true },
    { id: 'herkomst', question: 'Heeft u een voorkeur voor de herkomst van de AI-tool?', type: 'select', options: ['Geen voorkeur - beste oplossing telt','Bij voorkeur Nederlandse aanbieder','Bij voorkeur Europese aanbieder','Bij voorkeur buiten Europa','Anders'] },
    { id: 'herkomstAnders', question: 'Kunt u uw voorkeur voor herkomst toelichten?', type: 'textarea', placeholder: 'Bijv. alleen aanbieders uit specifieke landen', conditional: true, showWhen: { field: 'herkomst', value: 'Anders' } }
];

const state = {
    screen: 'intro', // intro | tips | questions | result
    step: 0,
    formData: {},
    prompt: ''
};

function isQuestionVisible(q) {
    if (!q.conditional) return true;
    const sw = q.showWhen;
    const val = state.formData[sw.field] || '';
    if (sw.value) return val === sw.value;
    if (sw.values) return sw.values.includes(val);
    return true;
}

function getVisibleStep(from, dir) {
    let s = from + dir;
    while (s >= 0 && s < questions.length) {
        if (isQuestionVisible(questions[s])) return s;
        s += dir;
    }
    return -1;
}

function generatePrompt() {
    const fd = state.formData;
    const procesText = fd.proces === 'Anders' ? (fd.procesAnders || '') : (fd.proces || '');
    const pijnpunt = Array.isArray(fd.pijnpunt) ? fd.pijnpunt.join(', ') : '';
    const dataGev = Array.isArray(fd.dataGevoeligheid) ? fd.dataGevoeligheid.join(', ') : '';

    return `# AI Tool Zoekopdracht voor ${fd.bedrijfsnaam || 'Transportbedrijf'}

## BELANGRIJKE CONTEXT
Dit bedrijf is actief in de logistiek sector. ALLE aanbevolen AI-tools MOETEN specifiek geschikt zijn voor logistieke bedrijven.

## Bedrijfsprofiel
- Sector: Logistiek (MKB)
- Aantal gebruikers: ${fd.medewerkers || '-'}
- Groei verwachting: ${fd.groeiVerwachting || '-'}
- Huidige digitalisatie: ${fd.digitalisatiegraad || '-'}
- Technisch niveau: ${fd.technischeKennis || '-'}

## Te verbeteren proces
- Hoofdproces: ${procesText}
- Grootste uitdaging: ${pijnpunt}
- Specifiek doel: ${fd.specifiekeDoel || '-'}
- Type oplossing: ${fd.oplossingstype || '-'}

## Zoekcriteria
- Eenmalig budget: ${fd.budget || '-'}
- Jaarlijks budget: ${fd.budgetJaarlijks || '-'}
- ROI verwachting: ${fd.roiVerwachting || '-'}
- Implementatie urgentie: ${fd.urgentie || '-'}
- Integratie: ${fd.integratie || '-'}
${fd.systeemNaam ? `- Specifieke systemen: ${fd.systeemNaam}` : ''}
- Data gevoeligheid: ${dataGev}
- Voorkeur herkomst: ${fd.herkomst || '-'}
- Training voorkeur: ${fd.trainingVoorkeur || '-'}

## Gevraagde output
Geef een lijst van minimaal 10 AI-tools specifiek voor logistiek die passen bij bovenstaand profiel. Maak voor elke tool:
- Naam en korte beschrijving (2-3 zinnen)
- Hoofdfunctionaliteiten
- Geschatte kosten
- Voorbeeld van gebruik in logistiek
- Sterke punten en aandachtspunten
- Link naar website

Sluit af met een vergelijkingstabel met scores (1-5) voor: prijs-kwaliteit, gebruiksvriendelijkheid, functionaliteit, support en schaalbaarheid. Sorteer op totaalscore.

Geef voor de top 3 tools ook een implementatieadvies met stappen, tijdlijn en valkuilen.`;
}

function render() {
    const app = document.getElementById('app');
    const { screen, step, formData } = state;

    if (screen === 'intro') {
        app.innerHTML = `
        <div class="bg-white rounded-2xl shadow-xl p-8 mt-6 fade">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-4xl">🚚</span>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">AI Tool Finder voor Logistiek</h1>
                    <p class="text-gray-500">Vind de juiste AI-oplossing voor uw bedrijf</p>
                </div>
            </div>
            <div class="bg-blue-50 border-l-4 border-blue-600 p-6 rounded-lg mb-6">
                <h2 class="font-bold text-blue-900 mb-3">💡 Hoe werkt het?</h2>
                <ol class="list-decimal list-inside space-y-2 text-gray-700">
                    <li>Beantwoord vragen over uw bedrijf en doelen</li>
                    <li>De tool genereert een gepersonaliseerde zoekprompt</li>
                    <li>Plak de prompt in ChatGPT, Claude, Perplexity of Gemini</li>
                    <li>De chatbot vindt de beste AI-tools voor uw situatie</li>
                </ol>
                <p class="text-sm text-gray-500 mt-3 italic">Duurt ongeveer 5-12 minuten</p>
            </div>
            <div class="bg-green-50 border-l-4 border-green-600 p-4 rounded-lg mb-6 text-sm text-gray-700">
                <strong>🔒 Privacy:</strong> Er wordt geen data opgeslagen. Uw antwoorden worden alleen gebruikt om een tekstprompt te genereren.
            </div>
            <button onclick="goTo('tips')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl text-lg transition">
                Tips bekijken →
            </button>
        </div>`;
        return;
    }

    if (screen === 'tips') {
        app.innerHTML = `
        <div class="bg-white rounded-2xl shadow-xl p-8 mt-6 fade">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-4xl">💡</span>
                <h2 class="text-2xl font-bold text-gray-800">Tips voordat u begint</h2>
            </div>
            <div class="bg-green-50 border-l-4 border-green-600 p-6 rounded-lg mb-6">
                <ul class="space-y-4 text-gray-700">
                    <li><strong>1. Wees zo compleet mogelijk</strong> — Hoe specifieker u antwoordt, hoe relevanter de aanbevelingen.</li>
                    <li><strong>2. Test bij meerdere chatbots</strong> — ChatGPT, Claude, Perplexity en Gemini geven elk unieke suggesties.</li>
                    <li><strong>3. Vragen overslaan kan</strong> — Gebruik de overslaan-knop als u een antwoord niet weet.</li>
                </ul>
            </div>
            <div class="flex gap-3">
                <button onclick="goTo('intro')" class="px-5 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl transition">← Terug</button>
                <button onclick="startQuestions()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition">Begin met vragenlijst →</button>
            </div>
        </div>`;
        return;
    }

    if (screen === 'result') {
        app.innerHTML = `
        <div class="bg-white rounded-2xl shadow-xl p-8 mt-6 fade">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-4xl">📄</span>
                <h2 class="text-2xl font-bold text-gray-800">Uw gepersonaliseerde zoekprompt</h2>
            </div>
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-6 max-h-80 overflow-y-auto">
                <pre class="whitespace-pre-wrap text-sm text-gray-700 font-mono">${escHtml(state.prompt)}</pre>
            </div>
            <div class="bg-blue-50 border-l-4 border-blue-600 p-5 rounded-lg mb-4">
                <p class="font-semibold text-blue-900 mb-2">📋 Volgende stap</p>
                <p class="text-gray-700 text-sm">Kopieer de prompt en plak deze in: <strong>ChatGPT</strong>, <strong>Claude</strong>, <strong>Perplexity</strong>, <strong>Google Gemini</strong> of <strong>Microsoft Copilot</strong>.</p>
            </div>
            <div class="bg-green-50 border-l-4 border-green-600 p-4 rounded-lg mb-6 text-sm text-gray-700">
                <strong>🔒 Let op:</strong> Zodra u de prompt deelt met een AI-chatbot, vallen uw gegevens onder het privacybeleid van die dienst.
            </div>
            <div class="flex gap-3">
                <button onclick="copyPrompt()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition">📋 Kopieer prompt</button>
                <button onclick="reset()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-semibold py-3 rounded-xl transition">🔄 Opnieuw</button>
            </div>
        </div>`;
        return;
    }

    // Questions screen
    const q = questions[step];
    const totalVisible = questions.filter(isQuestionVisible).length;
    const visibleIndex = questions.slice(0, step + 1).filter(isQuestionVisible).length;
    const progress = (visibleIndex / totalVisible) * 100;
    const val = formData[q.id];
    const isEmpty = q.type === 'multiselect' ? (!val || val.length === 0) : !val;
    const canNext = q.optional || !isEmpty;

    let inputHtml = '';
    if (q.type === 'text') {
        inputHtml = `<input type="text" id="qinput" value="${escHtml(val || '')}" placeholder="${escHtml(q.placeholder || '')}"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-gray-800"
            oninput="setVal('${q.id}', this.value)" />`;
    } else if (q.type === 'textarea') {
        inputHtml = `<textarea id="qinput" rows="4" placeholder="${escHtml(q.placeholder || '')}"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-gray-800 resize-none"
            oninput="setVal('${q.id}', this.value)">${escHtml(val || '')}</textarea>`;
    } else if (q.type === 'select') {
        const opts = q.options.map(o => `<option value="${escHtml(o)}" ${val === o ? 'selected' : ''}>${escHtml(o)}</option>`).join('');
        inputHtml = `<select id="qinput" onchange="setVal('${q.id}', this.value)"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-gray-800 bg-white">
            <option value="">-- Maak een keuze --</option>${opts}</select>`;
    } else if (q.type === 'multiselect') {
        const selected = val || [];
        inputHtml = q.options.map(o => {
            const isSel = selected.includes(o);
            return `<label class="flex items-center gap-3 p-4 border-2 rounded-xl cursor-pointer transition ${isSel ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-blue-300'}">
                <input type="checkbox" ${isSel ? 'checked' : ''} onchange="toggleMulti('${q.id}', '${escHtml(o)}')"
                    class="w-5 h-5 text-blue-600 rounded" />
                <span class="text-gray-700">${escHtml(o)}</span>
            </label>`;
        }).join('');
    }

    const prevStep = getVisibleStep(step, -1);
    const nextStep = getVisibleStep(step, 1);

    app.innerHTML = `
    <div class="bg-white rounded-2xl shadow-xl p-8 mt-6 fade">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-4xl">🚚</span>
            <div>
                <h1 class="text-xl font-bold text-gray-800">AI Tool Finder voor Logistiek</h1>
                <p class="text-gray-500 text-sm">Vind de juiste AI-oplossing voor uw bedrijf</p>
            </div>
        </div>
        <div class="mb-6">
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-blue-600 h-2 rounded-full transition-all" style="width:${progress}%"></div>
            </div>
            <p class="text-sm text-gray-500 mt-1">Stap ${visibleIndex} van ${totalVisible}</p>
        </div>
        <div class="mb-8">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">${escHtml(q.question)}</h2>
            <div class="space-y-2">${inputHtml}</div>
        </div>
        <div class="flex gap-3">
            ${prevStep >= 0 || state.screen === 'questions' && step === questions.findIndex(isQuestionVisible)
                ? `<button onclick="prevQ(${prevStep})" class="flex items-center gap-1 px-5 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl transition">← Vorige</button>`
                : `<button onclick="goTo('tips')" class="flex items-center gap-1 px-5 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl transition">← Terug</button>`
            }
            <button onclick="skipQ()" class="px-4 py-3 bg-yellow-50 hover:bg-yellow-100 text-yellow-800 font-semibold rounded-xl transition text-sm">⏭ Overslaan</button>
            <button onclick="nextQ(${nextStep})" ${canNext ? '' : 'disabled'}
                class="flex-1 py-3 px-6 rounded-xl font-semibold transition ${canNext ? 'bg-blue-600 hover:bg-blue-700 text-white cursor-pointer' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}">
                ${nextStep < 0 ? 'Genereer prompt ✓' : 'Volgende →'}
            </button>
        </div>
    </div>`;
}

function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function goTo(s) { state.screen = s; render(); }

function startQuestions() {
    state.screen = 'questions';
    state.step = questions.findIndex(isQuestionVisible);
    render();
}

function setVal(id, val) {
    state.formData[id] = val;
    // Re-enable next button without full re-render for text inputs
    const btn = document.querySelector('button[onclick^="nextQ"]');
    if (btn) {
        const q = questions[state.step];
        const isEmpty = !val;
        const canNext = q.optional || !isEmpty;
        btn.disabled = !canNext;
        btn.className = `flex-1 py-3 px-6 rounded-xl font-semibold transition ${canNext ? 'bg-blue-600 hover:bg-blue-700 text-white cursor-pointer' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`;
    }
}

function toggleMulti(id, option) {
    const cur = state.formData[id] || [];
    state.formData[id] = cur.includes(option) ? cur.filter(v => v !== option) : [...cur, option];
    render();
}

function nextQ(nextStep) {
    const q = questions[state.step];
    const val = state.formData[q.id];
    const isEmpty = q.type === 'multiselect' ? (!val || val.length === 0) : !val;
    if (!q.optional && isEmpty) return;
    if (nextStep < 0) {
        state.prompt = generatePrompt();
        state.screen = 'result';
    } else {
        state.step = nextStep;
    }
    render();
}

function skipQ() {
    const next = getVisibleStep(state.step, 1);
    if (next < 0) {
        state.prompt = generatePrompt();
        state.screen = 'result';
    } else {
        state.step = next;
    }
    render();
}

function prevQ(prevStep) {
    if (prevStep < 0) { goTo('tips'); return; }
    state.step = prevStep;
    render();
}

function reset() {
    state.screen = 'intro';
    state.step = 0;
    state.formData = {};
    state.prompt = '';
    render();
}

function copyPrompt() {
    navigator.clipboard.writeText(state.prompt).then(() => alert('Prompt gekopieerd naar klembord!')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = state.prompt;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Prompt gekopieerd!');
    });
}

render();
</script>
</body>
</html>
